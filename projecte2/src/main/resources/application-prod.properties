# Production Profile - MySQL Database

# Database Configuration - MySQL (configurar con datos reales)
spring.datasource.url=jdbc:mysql://localhost:3306/projecte2_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging - Production mode
logging.level.root=WARN
logging.level.com.ra34.projecte2=INFO
